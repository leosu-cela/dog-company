basePath: /api/v1
definitions:
  github_com_leosu-cela_dog-company_pkg_tool.CommonResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  internal_leaderboard.EntryOutput:
    properties:
      days:
        type: integer
      goal:
        type: integer
      id:
        type: integer
      money:
        type: integer
      nickname:
        type: string
      office_level:
        type: integer
      projects_completed:
        type: integer
      staff_count:
        type: integer
      submitted_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_leaderboard.ListOutput:
    properties:
      entries:
        items:
          $ref: '#/definitions/internal_leaderboard.EntryOutput'
        type: array
      me:
        $ref: '#/definitions/internal_leaderboard.Me'
    type: object
  internal_leaderboard.Me:
    properties:
      entry:
        $ref: '#/definitions/internal_leaderboard.EntryOutput'
      rank:
        type: integer
    type: object
  internal_leaderboard.SubmitOutput:
    properties:
      id:
        type: integer
      rank:
        type: integer
      total:
        type: integer
    type: object
  internal_leaderboard.SubmitPayload:
    properties:
      days:
        example: 58
        type: integer
      goal:
        example: 50000
        type: integer
      money:
        example: 52340
        type: integer
      office_level:
        example: 4
        type: integer
      projects_completed:
        example: 32
        type: integer
      staff_count:
        example: 9
        type: integer
    required:
    - days
    - goal
    - money
    type: object
  internal_save.ConflictData:
    properties:
      server_data:
        type: object
      server_revision:
        type: integer
      server_updated_at:
        type: string
    type: object
  internal_save.GetOutput:
    properties:
      data:
        type: object
      revision:
        type: integer
      updated_at:
        type: string
      version:
        type: integer
    type: object
  internal_save.SavePayload:
    properties:
      data:
        type: object
      revision:
        example: 3
        type: integer
      version:
        example: 2
        type: integer
    required:
    - data
    - version
    type: object
  internal_save.UpsertOutput:
    properties:
      revision:
        type: integer
      updated_at:
        type: string
      version:
        type: integer
    type: object
  internal_user.LoginOutput:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
    type: object
  internal_user.MeOutput:
    properties:
      account:
        type: string
      uid:
        type: string
      user_id:
        type: integer
    type: object
  internal_user.RefreshOutput:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
    type: object
  internal_user.RegisterOutput:
    properties:
      account:
        type: string
      uid:
        type: string
      user_id:
        type: integer
    type: object
  internal_user.loginRequest:
    properties:
      account:
        example: leo@cela-tech.com
        type: string
      password:
        example: hunter2000
        type: string
    required:
    - account
    - password
    type: object
  internal_user.logoutRequest:
    properties:
      refresh_token:
        example: abc123...
        type: string
    required:
    - refresh_token
    type: object
  internal_user.refreshRequest:
    properties:
      refresh_token:
        example: abc123...
        type: string
    required:
    - refresh_token
    type: object
  internal_user.registerRequest:
    properties:
      account:
        example: leo@cela-tech.com
        type: string
      password:
        example: hunter2000
        type: string
    required:
    - account
    - password
    type: object
info:
  contact: {}
  description: Member system for dog-company (register, login, profile).
  title: dog-company API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns an access token (6h) and a refresh token (30d). Use the
        access token in Authorization header; use the refresh token at /auth/refresh
        to rotate.
      parameters:
      - description: login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_user.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_user.LoginOutput'
              type: object
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "401":
          description: account or password incorrect
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      summary: Login with account + password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate the given refresh token. Idempotent — unknown or already-revoked
        tokens return OK. Access tokens remain valid until their 6h TTL; this endpoint
        does not revoke them.
      parameters:
      - description: logout payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_user.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      summary: Revoke a refresh token
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the user identified by the JWT in the Authorization header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_user.MeOutput'
              type: object
        "401":
          description: missing / invalid / expired token
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a fresh access + refresh pair.
        The old refresh token is revoked (one-time use). If a revoked token is reused,
        all of the user's refresh tokens are invalidated (reuse detection) and the
        client must login again.
      parameters:
      - description: refresh payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_user.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_user.RefreshOutput'
              type: object
        "400":
          description: refresh_token required
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "401":
          description: invalid / expired / reused refresh token
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      summary: Rotate refresh token and issue new access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new account. Account is normalized to lowercase; accepts
        email or [a-z0-9_]{3,30}. Password must be 8-72 chars.
      parameters:
      - description: register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_user.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_user.RegisterOutput'
              type: object
        "400":
          description: invalid request body / validation failed
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "409":
          description: account already exists
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      summary: Register a new user
      tags:
      - auth
  /leaderboard:
    get:
      description: Returns top entries sorted by days ASC, money DESC, projects_completed
        DESC. Auth is optional — if a valid Bearer token is provided and the user
        has any entry for this goal, the response also includes me with the user's
        best entry and global rank. Default goal=50000, default limit=10 (max 50).
      parameters:
      - description: max entries (default 10, max 50)
        in: query
        name: limit
        type: integer
      - description: goal amount (default 50000)
        in: query
        name: goal
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_leaderboard.ListOutput'
              type: object
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      summary: Get leaderboard top N (+ caller's me when authed)
      tags:
      - leaderboard
    post:
      consumes:
      - application/json
      description: Records an IPO completion. Nickname is taken from the authenticated
        user's account (client cannot spoof). Duplicate submissions (same user+goal+days+money+projects_completed
        within 1 minute) are silently deduplicated and return the existing entry.
      parameters:
      - description: submit payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_leaderboard.SubmitPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_leaderboard.SubmitOutput'
              type: object
        "400":
          description: bad payload / sanity failed
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "401":
          description: missing / invalid / expired token
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      security:
      - BearerAuth: []
      summary: Submit a leaderboard entry
      tags:
      - leaderboard
  /saves:
    delete:
      description: Idempotently deletes the authenticated user's save. Returns 200
        even when no save existed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "401":
          description: missing / invalid / expired token
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      security:
      - BearerAuth: []
      summary: Delete current save
      tags:
      - saves
    get:
      description: Returns the authenticated user's current save. If no save exists,
        data is null.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_save.GetOutput'
              type: object
        "401":
          description: missing / invalid / expired token
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      security:
      - BearerAuth: []
      summary: Get current save
      tags:
      - saves
    post:
      consumes:
      - application/json
      description: Creates the save if absent (accepts any client revision, server
        starts at 1). If present, client revision must equal server's current revision,
        otherwise 409 with server state. Body is capped at 64 KiB.
      parameters:
      - description: save payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_save.SavePayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_save.UpsertOutput'
              type: object
        "400":
          description: bad payload / unsupported version / sanity failed
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "401":
          description: missing / invalid / expired token
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
        "409":
          description: revision conflict; data carries server state
          schema:
            allOf:
            - $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_save.ConflictData'
              type: object
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/github_com_leosu-cela_dog-company_pkg_tool.CommonResponse'
      security:
      - BearerAuth: []
      summary: Create or overwrite current save
      tags:
      - saves
securityDefinitions:
  BearerAuth:
    description: Type "Bearer {token}" (without quotes).
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
